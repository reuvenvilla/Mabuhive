steps:
  # 1. Build base stage
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-f', 'docker/Dockerfile',
      '--target', 'base',
      '-t', 'gcr.io/$PROJECT_ID/mabuhive:base',
      '.'
    ]

  # 2. Build deploy stage as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-f', 'docker/Dockerfile',
      '--target', 'deploy',
      '-t', 'gcr.io/$PROJECT_ID/mabuhive:latest',
      '.'
    ]

  # 3. If _RELEASE is set, tag latest as release
  # Note: The images block below will handle the actual pushing
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      if [[ "${_RELEASE}" == "true" ]]; then
        docker tag gcr.io/$PROJECT_ID/mabuhive:latest gcr.io/$PROJECT_ID/mabuhive:release
      fi

# Automatically pushes all built/tagged images to GCR
images:
  - 'gcr.io/$PROJECT_ID/mabuhive:base'
  - 'gcr.io/$PROJECT_ID/mabuhive:latest'
  - 'gcr.io/$PROJECT_ID/mabuhive:release'

substitutions:
  _RELEASE: 'false'
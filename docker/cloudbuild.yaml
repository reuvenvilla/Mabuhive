steps:
  # 1. Build base stage
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-f', 'docker/Dockerfile',
      '--target', 'base',
      '-t', 'gcr.io/$PROJECT_ID/mabuhive:base',
      '.'
    ]

  # 2. Build deploy stage as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-f', 'docker/Dockerfile',
      '--target', 'deploy',
      '-t', 'gcr.io/$PROJECT_ID/mabuhive:latest',
      '.'
    ]

  # 3. Conditional tag AND push for release
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      if [[ "${_RELEASE}" == "true" ]]; then
        docker tag gcr.io/$PROJECT_ID/mabuhive:latest gcr.io/$PROJECT_ID/mabuhive:release
        docker push gcr.io/$PROJECT_ID/mabuhive:release
      fi

# MANDATORY: Only list images that are built every single time.
images:
  - 'gcr.io/$PROJECT_ID/mabuhive:base'
  - 'gcr.io/$PROJECT_ID/mabuhive:latest'

substitutions:
  _RELEASE: 'false'
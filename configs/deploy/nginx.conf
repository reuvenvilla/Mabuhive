# configs/deploy/nginx.conf
# Production — security headers, static file caching, strict timeouts.

upstream django_deploy {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 20M;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "same-origin"    always;

    # /public/ — NGINX serves directly, long-lived cache
    location /public/ {
        alias       /app/build/staticfiles/;
        expires     30d;
        add_header  Cache-Control "public, no-transform";
        access_log  off;
    }

    # Everything else → Gunicorn
    location / {
        proxy_pass          http://django_deploy;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
    }
}

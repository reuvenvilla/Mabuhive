# configs/test/nginx.conf
# Test / staging environment.
# NGINX serves static files directly from the collected staticfiles dir;
# everything else proxies to Gunicorn.

upstream django_test {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /api/static/ {
        alias /app/build/staticfiles/;
        expires 1h;
    }

    location / {
        proxy_pass          http://django_test;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }
}

# configs/local/nginx.conf
# Local development.
# Django dev server handles everything including static files (DEBUG=True).
# NGINX is just a pass-through so the local stack mirrors production topology.

upstream django_local {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Proxy all traffic to Django (static files served by Django in dev)
    location / {
        proxy_pass          http://django_local;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }
}
